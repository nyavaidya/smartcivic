<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCivic Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="sc-nav">
  <div class="sc-nav-brand">
    <span class="dot"></span>
    Smart<span class="brand-accent">Civic</span>
  </div>
  <div class="sc-nav-actions">
    <button id="logoutBtn" class="btn-ghost btn-sm">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
      </svg>
      Logout
    </button>
  </div>
</nav>

<div class="sc-container" style="padding-top:32px; padding-bottom:48px;">

  <!-- Profile Card -->
  <div class="sc-card sc-fade-up" style="display:flex; align-items:center; gap:20px; margin-bottom:28px; padding:22px 24px;">
    <div id="avatar"></div>
    <div style="flex:1;">
      <p id="userName" style="font-family:var(--font-display); font-size:1.1rem; font-weight:700; color:var(--white-pure); margin-bottom:3px;"></p>
      <p id="userEmail" style="font-size:13px; color:var(--slate); margin-bottom:2px;"></p>
      <p id="userPhone" style="font-size:13px; color:var(--slate);"></p>
    </div>
    <button id="lodgeComplaintBtn" class="btn-primary">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Lodge Complaint
    </button>
  </div>

  <!-- Complaints Table -->
  <div class="sc-fade-up" style="animation-delay:0.1s;">
    <div class="sc-section-header">
      <div class="sc-section-title">My Complaints</div>
    </div>

    <div class="sc-table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Category</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="complaintsTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
