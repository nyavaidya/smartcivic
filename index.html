<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCivic</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="sc-center-page">
  <div style="width:100%; max-width:460px; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;">

    <!-- Brand -->
    <div style="text-align:center; margin-bottom:48px;">
      <div style="display:inline-flex; align-items:center; gap:10px; margin-bottom:20px;">
        <span class="dot" style="width:12px;height:12px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--amber);display:inline-block;"></span>
        <span style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--white-pure);">Smart<span style="color:var(--amber)">Civic</span></span>
      </div>
      <h1 style="font-size:clamp(1.6rem,4vw,2rem); margin-bottom:10px;">Report. Track. Resolve.</h1>
      <p style="color:var(--slate); font-size:15px;">Connecting citizens with city administration for a smarter, cleaner city.</p>
    </div>

    <!-- Role Select -->
    <div id="roleSelect">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">

        <button onclick="showUser()" style="
          background:var(--navy-card);
          border:1px solid var(--border);
          border-radius:var(--radius-lg);
          padding:28px 20px;
          display:flex; flex-direction:column; align-items:center; gap:12px;
          color:var(--white); font-size:14px; font-weight:500;
          transition:all var(--transition); cursor:pointer;
        " onmouseover="this.style.borderColor='rgba(245,158,11,0.4)';this.style.background='rgba(245,158,11,0.06)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--navy-card)'">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--amber)" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
          <div>
            <div style="font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--white-pure); margin-bottom:4px;">Citizen Portal</div>
            <div style="font-size:12px; color:var(--slate);">Report & track issues</div>
          </div>
        </button>

        <button onclick="showAdmin()" style="
          background:var(--navy-card);
          border:1px solid var(--border);
          border-radius:var(--radius-lg);
          padding:28px 20px;
          display:flex; flex-direction:column; align-items:center; gap:12px;
          color:var(--white); font-size:14px; font-weight:500;
          transition:all var(--transition); cursor:pointer;
        " onmouseover="this.style.borderColor='rgba(245,158,11,0.4)';this.style.background='rgba(245,158,11,0.06)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--navy-card)'">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="var(--amber)" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
          </svg>
          <div>
            <div style="font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--white-pure); margin-bottom:4px;">Admin Panel</div>
            <div style="font-size:12px; color:var(--slate);">Manage & resolve</div>
          </div>
        </button>

      </div>
    </div>

    <!-- User Options -->
    <div id="userOptions" style="display:none;">
      <div class="sc-card">
        <h2 style="margin-bottom:6px;">Citizen Portal</h2>
        <p style="font-size:14px; color:var(--slate); margin-bottom:24px;">Access your account to report and track civic issues.</p>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <button onclick="goLogin()" class="btn-primary btn-full btn-lg">Login</button>
          <button onclick="goRegister()" class="btn-secondary btn-full btn-lg">Create Account</button>
        </div>
        <div style="margin-top:20px; text-align:center;">
          <button onclick="goBack()" class="btn-ghost btn-sm">← Back</button>
        </div>
      </div>
    </div>

    <!-- Admin Login -->
    <div id="adminLogin" style="display:none;">
      <div class="sc-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
          <div style="width:36px;height:36px;border-radius:8px;background:var(--amber-dim);border:1px solid var(--amber-glow);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="var(--amber)" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
          </div>
          <h2 style="font-size:1.1rem;">Admin Login</h2>
        </div>

        <div class="sc-field">
          <label>Username</label>
          <input id="adminUser" placeholder="Enter username">
        </div>
        <div class="sc-field">
          <label>Password</label>
          <input id="adminPass" type="password" placeholder="Enter password">
        </div>

        <div style="display:flex; flex-direction:column; gap:10px; margin-top:8px;">
          <button onclick="adminLogin()" class="btn-primary btn-full">Login to Admin Panel</button>
          <button onclick="goBack()" class="btn-ghost btn-full">← Back</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="/js/index.js"></script>
</body>
</html>
